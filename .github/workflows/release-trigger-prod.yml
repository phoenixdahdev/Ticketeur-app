name: Deploy Jobs to Trigger.dev (prod)
on:
  push:
    branches:
      - main
    paths:
      - "packages/jobs/**"
      - "packages/db/**"
      - "packages/email/**"
jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'Giftobafaiye/Ticketeur'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Deploy to Trigger.dev
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
          TRIGGER_PROJECT_REF: ${{ secrets.TRIGGER_PROJECT_REF }}
        run: pnpm --filter @ticketur/jobs run deploy
