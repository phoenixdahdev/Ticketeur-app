name: Deploy Web to Production

on:
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "packages/api/**"
      - "packages/db/**"
      - "packages/env/**"
      - "packages/ui/**"
      - "packages/eslint-config/**"
      - "packages/typescript-config/**"
      - "turbo.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: github.repository == 'Giftobafaiye/Ticketeur'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest
          package-manager-cache: false

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Make trivial bot commit (so last committer is GitHub Actions bot)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git commit --allow-empty -m "chore(ci): trivial bot commit to satisfy Vercel" \
            --author="github-actions[bot] <actions@github.com>"
          git --no-pager log -1 --pretty=fuller

      - name: Deploy to Vercel
        run: vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}
